<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Student petition to abolish midterms.">
    <title>{% block title %}Abolish Midterms Petition{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <nav class="nav">
        <a class="brand" href="{{ url_for('index') }}">No Midterms</a>
        <div class="nav-links">
          <a href="{{ url_for('index') }}">Sign</a>
          <a href="{{ url_for('signature_list') }}">Signatures</a>
          <a href="{{ url_for('export_csv') }}">CSV</a>
        </div>
      </nav>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-wrap">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
